<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in HTML</title>
</head>
<body>
    <h3>Unordered list:</h3>
    <ul>
        <li>camry</li>
        <li>jeep</li>
        <li>gt650</li>
        <ul type="circle">
            <li>blck</li>
            <li>silver</li>
        </ul>
        <li>hunter350</li>
        <li>caymen</li>
    </ul>
    <h3>Ordered list:</h3>
    <ol>
        <li>camry</li>
        <li>jeep</li>
        <li>gt650</li>
        <li>hunter350</li>
        <li>caymen</li>
    </ol>

    <h4>Defination list</h4>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JS</dt>
        <dd>Javascript</dd>
    </dl>
</body>
</html>
